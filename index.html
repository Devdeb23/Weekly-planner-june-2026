<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Planner Settimanale</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>

    <style>
        /*I Colori del tema notte*/
        body {
            background-color: #696969;
            color: #FFFAF0; 
        }
    </style>
    </head>
    <body class="p-8"> <!--Titolo del planner con classi Tailwind per dimensione del testo, grassetto e margine inferiore-->

        <h1 class="text-3xl font-bold mb-6">Planner Settimanale</h1>

        <!--Contenitore principale del planner-->
        <!--CSS Grid: 7 colonne uguali con un pò di spazio-->
        <div class="grid grid-cols-7 gap-2 bg-white p-4 roundend-x1 shadow-1g h-[500px]">
        
            <!--Colonna del lunedì-->
            <div class="border-r border-teal-100 flex flex-col">
                <div class="bg-[#FFFAF0] text-center font-bold py-1 rounded">MON</div>
            </div>"
        </div>
    </body>
