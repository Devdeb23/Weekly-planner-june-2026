<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Planner Settimanale</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>

    <!--Importo font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>
        /*I Colori del tema notte*/
        body {
            font-family: 'Raleway';
            background-color: #696969;
            color: #FFFAF0; 
        }
    </style>
    </head>
    <body class="p-8"> <!--Titolo del planner con classi Tailwind per dimensione del testo, grassetto e margine inferiore-->

        <h1 class="text-3xl font-bold mb-6">Planner Settimanale</h1>

        <!--Contenitore principale del planner-->
        <!--CSS Grid: 7 colonne uguali con un pò di spazio-->
        <div class="grid grid-cols-7 gap-2 bg-white p-4 roundend-xl shadow-lg h-[500px]">
        
            <!--Colonna del lunedì-->
            <div class="border-r border-teal-100 flex flex-col">
                <div class="bg-[#FFFAF0] text-center font-bold py-1 rounded">MON</div>
                <!--Questo div serve per le ore-->
                <div id="colonna-0" class="flex-grow mt-2"></div>
            </div>

            <!--Colonna Martedì-->
            <div class="border-r border-teal-100 flex flex-col">
                <div class="bg-[#FFFAF0] text-center font-bold py-1 rounded">TUE</div>
                <div id="colonna-1" class="flex-grow mt-2"></div>
            </div>

            <!--Colonna Mercoledì-->
            <div class="border-r border-teal-100 flex flex-col">
                <div class="bg-[#FFFAF0] text-center font-bold py-1 rounded">WED</div>
                <div id="colonna-2" class="flex-grow mt-2"></div>
            </div>       
            
            <!--Colonna Giovedì-->
            <div class="border-r border-teal-100 flex flex-col">
                <div class="bg-[#FFFAF0] text-center font-bold py-1 rounded">THU</div>
                <div id="colonna-3" class="flex-grow mt-2"></div>
            </div>   
            
            <!--Colonna Venerdì-->
            <div class="border-r border-teal-100 flex flex-col">
                <div class="bg-[#FFFAF0] text-center font-bold py-1 rounded">FRI</div>
                <div id="colonna-4" class="flex-grow mt-2"></div>
            </div>

            <!--Colonna Sabato-->
            <div class="border-r border-teal-100 flex flex-col">
                <div class="bg-[#FFFAF0] text-center font-bold py-1 rounded">SAT</div>
                <div id="colonna-5" class="flex-grow mt-2"></div>
            </div>
            
            <!--Colonna Domenica-->
            <div class="flex flex-col">
                <div class="bg-[#FFFAF0] text-center font-bold py-1 rounded">SUN</div>
                <div id="colonna-6" class="flex-grow mt-2"></div>
            </div>            
            
        </div>

    <!-- Inizio lo script JS-->    
     <script>
        // 1.Definiamo l'ora d'inizio della giornata
        let oraInizioGiornata = 5;

        //2. Richiamo le colonne html create prima dei giorni
        let colonnaLunedì = document.getElementById('colonna-0');
        let colonnaMartedì = document.getElementById('colonna-1');
        let colonnaMercoledì = document.getElementById('colonna-2');
        let colonnaGiovedì = document.getElementById('colonna-3');
        let colonnaVenerdì = document.getElementById('colonna-4');
        let colonnaSabato = document.getElementById('colonna-5');
        let colonnaDomenica = document.getElementById('colonna-6');

        //3. Creo un ciclo che si ripete 17 volte (le ore della giornata attive)
        for (let i =0; i < 17; i++) {
            
            let oraCalcolata = oraInizioGiornata +i;
            let etichettaOra = oraCalcolata + ":00";

            // Creo un pezzo di html per ogni songola riga
            let rigaHtml = `
            <div class="flex items-center gap-2 border-b border-teal-50 py-1">
                <span class="text-xs font-bold text-teal-600 w-8 text-right">${etichettaOra}</span>
                <div contenteditable="true" class="w-full text-sm outline-none bg-transparent"></div>
            </div>    
            ` ;

            //Iniettiamo questa riga dentro le nostre colonne
            colonnaLunedì.insertAdjacentHTML('beforeend', rigaHtml);
            colonnaMartedì.insertAdjacentHTML('beforeend', rigaHtml);
            colonnaMercoledì.insertAdjacentHTML('beforeend', rigaHtml);
            colonnaGiovedì.insertAdjacentHTML('beforeend', rigaHtml);
            colonnaVenerdì.insertAdjacentHTML('beforeend', rigaHtml);
            colonnaSabato.insertAdjacentHTML('beforeend', rigaHtml);
            colonnaDomenica.insertAdjacentHTML('beforeend', rigaHtml);

        }
     </script>
    </body>
    </html>
